<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Bank - Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --ink: #292524;
      --muted: #78716c;
      --line: #e7e5e4;
      --color-brand: #BA8F2E;
      --color-brand-hover: #9c7726;
      --color-brand-light: rgba(186, 143, 46, 0.08);
      --color-success: #10b981;
      --color-error: #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-request {
      margin-left: 12px;
      padding: 8px 14px;
      border: 1px solid rgba(186,143,46,.25);
      background: rgba(186,143,46,.08);
      color: var(--color-brand);
      text-decoration: none;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      transition: all .2s ease;
      white-space: nowrap;
    }

    .header-request:hover {
      background: var(--color-brand);
      color: #fff;
      border-color: var(--color-brand);
      transform: translateY(-1px);
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .brand-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-brand);
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .header-right {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    #clock-date { font-weight: 500; }
    #clock-time { font-size: 14px; color: var(--color-brand); font-weight: 700; }

    main {
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .headline { margin-bottom: 32px; }

    .headline h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .headline h1 span { color: var(--color-brand); }

    .headline p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 520px;
    }

    .config-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 24px;
      display: none;
    }

    .config-banner code {
      background: #fee2e2;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .search-box {
      margin-left: 0;
    }

    .search-input {
      width: 220px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all .2s ease;
    }

    .search-input:focus {
      border-color: var(--color-brand);
      box-shadow: 0 0 0 3px var(--color-brand-light);
    }

    .tab-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'Inter', sans-serif;
    }

    .tab-btn:hover { border-color: var(--color-brand); color: var(--color-brand); }

    .tab-btn.active {
      background: var(--color-brand);
      border-color: var(--color-brand);
      color: #fff;
    }

    .link-list { display: flex; flex-direction: column; gap: 8px; }

    .link-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .link-card:hover {
      border-color: var(--color-brand);
      box-shadow: 0 0 0 3px var(--color-brand-light);
    }

    .link-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-category-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 100px;
      background: var(--color-brand-light);
      color: var(--color-brand);
      flex-shrink: 0;
      display: none;
    }

    .link-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-action {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'Inter', sans-serif;
    }

    .btn-action:hover {
      background: var(--bg);
      border-color: var(--color-brand);
      color: var(--color-brand);
    }

    .btn-action.copy {
      background: var(--color-brand);
      border-color: var(--color-brand);
      color: #fff;
    }

    .btn-action.copy:hover { background: var(--color-brand-hover); border-color: var(--color-brand-hover); }
    .btn-action.copy.copied { background: var(--color-success); border-color: var(--color-success); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .empty-state svg { opacity: 0.3; margin-bottom: 12px; }

    .skeleton { display: flex; flex-direction: column; gap: 8px; }
    .skeleton-row {
      height: 52px;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--line) 25%, #f0eeec 50%, var(--line) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #toast {
      position: fixed;
