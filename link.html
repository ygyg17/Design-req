<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link Bank — The Seminyak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
</head>
<body>

  <header>
    <div class="header-content">
      <img src="https://cdn-5d8995b3f911c90950a6130b.closte.com/wp-content/uploads/2024/08/the-seminyak-logo-aug24v1.png" alt="The Seminyak">
      <div class="brand-block">
        <div class="brand-eyebrow">The Seminyak</div>
        <div class="brand-name">Link Bank</div>
      </div>
    </div>
  </header>

  <main>
    <div class="card dashboard-card">
      <div class="dashboard-header">
        <div>
          <div class="dashboard-title">All Links</div>
          <div class="dashboard-subtitle">Saved links organized by category</div>
        </div>
        <div class="dashboard-controls">
          <input type="text" id="searchInput" placeholder="Search links..." style="width:200px;">
        </div>
      </div>

      <div class="link-bank-header">
        <div class="link-filter-bar" id="linkFilterBar"></div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Link Name</th>
              <th>Category</th>
              <th>URL</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="linkTableBody">
            <tr><td colspan="4" class="table-state"><span class="loading-dots"><span></span><span></span><span></span></span>Loading links...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <footer>
    <span>&copy; The Seminyak</span>
  </footer>

  <script>
    const sbLink = supabase.createClient(SUPABASE_CONFIG.URL, SUPABASE_CONFIG.ANON_KEY);

    function esc(s) { return !s ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escAttr(s) { return String(s).replace(/'/g, "\\'"); }

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = type || '';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    let allLinks = [];
    let activeFilter = 'All';

    async function loadLinks() {
      const tbody = document.getElementById('linkTableBody');
      tbody.innerHTML = '<tr><td colspan="4" class="table-state"><span class="loading-dots"><span></span><span></span><span></span></span>Loading links...</td></tr>';

      const { data, error } = await sbLink
        .from('links')
        .select('id, name, url, category')
        .order('category', { ascending: true })
        .order('name', { ascending: true });

      if (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="4" class="table-state table-state--error">Failed to load links.</td></tr>';
        return;
      }

      allLinks = data || [];
      renderFilterBar();
      renderLinkTable();
    }

    function renderFilterBar() {
      const cats = [...new Set(allLinks.map(l => l.category))].sort();
      const bar = document.getElementById('linkFilterBar');
      let html = `<button type="button" class="btn-outline link-tab-btn ${activeFilter === 'All' ? 'link-tab-btn--active' : ''}" data-cat="All">All</button>`;
      cats.forEach(cat => {
        html += `<button type="button" class="btn-outline link-tab-btn ${activeFilter === cat ? 'link-tab-btn--active' : ''}" data-cat="${escAttr(cat)}">${esc(cat)}</button>`;
      });
      bar.innerHTML = html;
    }

    document.getElementById('linkFilterBar').addEventListener('click', function(e) {
      const btn = e.target.closest('.link-tab-btn');
      if (!btn) return;
      activeFilter = btn.dataset.cat;
      renderFilterBar();
      renderLinkTable();
    });

    function renderLinkTable() {
      const tbody = document.getElementById('linkTableBody');
      const q = document.getElementById('searchInput').value.toLowerCase().trim();

      let filtered = activeFilter === 'All' ? allLinks : allLinks.filter(l => l.category === activeFilter);
      if (q) {
        filtered = filtered.filter(l =>
          (l.name || '').toLowerCase().includes(q) ||
          (l.url || '').toLowerCase().includes(q)
        );
      }

      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="table-state">${q ? 'No results found' : 'No links in this category'}</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(item => `
        <tr>
          <td>${esc(item.name)}</td>
          <td><span class="badge badge--pending">${esc(item.category)}</span></td>
          <td>
            <a href="${esc(item.url)}" target="_blank" rel="noopener" class="file-link link-url-cell" title="${escAttr(item.url)}">
              ${esc(item.url)}
            </a>
          </td>
          <td class="action-cell">
            <button type="button" class="btn-action" id="cpbtn-${escAttr(item.id)}" onclick="copyLink('${escAttr(item.url)}', '${escAttr(item.id)}')">Copy</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', renderLinkTable);

    function copyLink(url, id) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('cpbtn-' + id);
        if (btn) {
          const original = btn.textContent;
          btn.textContent = 'Copied!';
          btn.classList.add('btn-action--copied');
          setTimeout(() => {
            btn.textContent = original;
            btn.classList.remove('btn-action--copied');
          }, 2000);
        }
      }).catch(() => showToast('Failed to copy link', 'error'));
    }

    loadLinks();
  </script>
</body>
</html>
