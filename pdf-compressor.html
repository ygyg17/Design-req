<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Compressor - Marketing The Seminyak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-content">
      <img src="https://cdn-5d8995b3f911c90950a6130b.closte.com/wp-content/uploads/2024/08/the-seminyak-logo-aug24v1.png" alt="The Seminyak Logo">
      <div class="brand-block">
        <span class="brand-eyebrow">The Seminyak</span>
        <span class="brand-name">PDF Compressor</span>
      </div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="card-heading">
        <h1 class="card-title">PDF Compressor</h1>
        <p class="card-subtitle">Reduce PDF file size in your browser.</p>
      </div>

      <div class="notice">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z" />
        </svg>
        <span>Best for visual PDFs. Text may become non-selectable.</span>
      </div>

      <div class="form-group">
        <label for="pdfFile">PDF File <span class="req">*</span></label>
        <label class="file-drop-area" id="dropArea" for="pdfFile">
          <input type="file" id="pdfFile" accept="application/pdf">
          <span class="file-icon">
            <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M7 16a4 4 0 01.88-7.9A5 5 0 1118.9 10H19a3 3 0 010 6h-1m-5-4v8m0 0l-3-3m3 3l3-3" />
            </svg>
          </span>
          <span class="file-msg" id="fileName">Choose a PDF</span>
          <span class="file-submsg" id="fileSize">Select a compression mode below</span>
        </label>
      </div>

      <div class="form-group">
        <label for="compressionMode">Compression Mode</label>
        <div class="select-wrapper">
          <select id="compressionMode">
            <option value="low">Low - better quality</option>
            <option value="medium" selected>Medium - balanced</option>
            <option value="high">High - smaller file</option>
          </select>
          <svg class="select-arrow" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>

      <button id="compressBtn" type="button" disabled>
        <span class="spinner" id="spinner"></span>
        <span id="buttonText">Compress PDF</span>
      </button>

      <p class="field-hint" id="statusText" style="margin-top: 14px;"></p>
      <a class="file-link" id="downloadLink" href="#" download style="display: none; margin-top: 10px;">Download compressed PDF</a>
    </section>
  </main>

  <footer>
    <a href="index.html">Back to Dashboard</a>
    <span>&copy; 2026 The Seminyak Marketing Team</span>
  </footer>

  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const pdfInput = document.getElementById('pdfFile');
    const dropArea = document.getElementById('dropArea');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const modeSelect = document.getElementById('compressionMode');
    const compressBtn = document.getElementById('compressBtn');
    const spinner = document.getElementById('spinner');
    const buttonText = document.getElementById('buttonText');
    const statusText = document.getElementById('statusText');
    const downloadLink = document.getElementById('downloadLink');
    const toast = document.getElementById('toast');

    const presets = {
      low: { scale: 1.5, quality: 0.82 },
      medium: { scale: 1.15, quality: 0.62 },
      high: { scale: 0.85, quality: 0.42 }
    };

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function formatBytes(bytes) {
      if (!bytes) return '0 KB';
      const units = ['B', 'KB', 'MB', 'GB'];
      const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
      return `${(bytes / Math.pow(1024, index)).toFixed(index ? 2 : 0)} ${units[index]}`;
    }

    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = `show ${type}`;
      setTimeout(() => toast.className = '', 2600);
    }

    function setBusy(isBusy) {
      compressBtn.disabled = isBusy || !pdfInput.files.length;
      spinner.style.display = isBusy ? 'inline-block' : 'none';
      buttonText.textContent = isBusy ? 'Compressing...' : 'Compress PDF';
    }

    function setSelectedFile(file) {
      if (!file) return;
      dropArea.classList.add('has-file');
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      statusText.textContent = '';
      downloadLink.style.display = 'none';
      compressBtn.disabled = false;
    }

    pdfInput.addEventListener('change', () => setSelectedFile(pdfInput.files[0]));

    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, event => {
        event.preventDefault();
        dropArea.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, event => {
        event.preventDefault();
        dropArea.classList.remove('dragover');
      });
    });

    dropArea.addEventListener('drop', event => {
      const file = event.dataTransfer.files[0];
      if (!file || file.type !== 'application/pdf') {
        showToast('Please choose a PDF file.', 'error');
        return;
      }

      const transfer = new DataTransfer();
      transfer.items.add(file);
      pdfInput.files = transfer.files;
      setSelectedFile(file);
    });

    compressBtn.addEventListener('click', async () => {
      const file = pdfInput.files[0];
      if (!file) return showToast('Please choose a PDF file.', 'error');

      const preset = presets[modeSelect.value];
      setBusy(true);
      downloadLink.style.display = 'none';

      try {
        const data = await file.arrayBuffer();
        const sourcePdf = await pdfjsLib.getDocument({ data }).promise;
        const { jsPDF } = window.jspdf;
        let outputPdf = null;

        for (let pageNumber = 1; pageNumber <= sourcePdf.numPages; pageNumber++) {
          statusText.textContent = `Processing page ${pageNumber} of ${sourcePdf.numPages}...`;

          const page = await sourcePdf.getPage(pageNumber);
          const viewport = page.getViewport({ scale: preset.scale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d', { alpha: false });

          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);

          await page.render({ canvasContext: context, viewport }).promise;

          const image = canvas.toDataURL('image/jpeg', preset.quality);
          const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';

          if (!outputPdf) {
            outputPdf = new jsPDF({ orientation, unit: 'px', format: [canvas.width, canvas.height], compress: true });
          } else {
            outputPdf.addPage([canvas.width, canvas.height], orientation);
          }

          outputPdf.addImage(image, 'JPEG', 0, 0, canvas.width, canvas.height, undefined, 'FAST');
          canvas.width = 0;
          canvas.height = 0;
        }

        const blob = outputPdf.output('blob');
        const url = URL.createObjectURL(blob);
        const originalName = file.name.replace(/\.pdf$/i, '');

        downloadLink.href = url;
        downloadLink.download = `${originalName}-compressed.pdf`;
        downloadLink.style.display = 'inline-flex';
        statusText.textContent = `${formatBytes(file.size)} to ${formatBytes(blob.size)}`;
        showToast('PDF ready.');
      } catch (error) {
        console.error(error);
        statusText.textContent = '';
        showToast('Compression failed.', 'error');
      } finally {
        setBusy(false);
      }
    });
  </script>

</body>
</html>
